name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    # ← fixes the Node.js warning

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2          # ← updated

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.1        # ← updated

        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x BudgetTracker/gradlew

      - name: Build with Gradle
        run: cd BudgetTracker && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: BudgetTracker/app/build/outputs/apk/debug/app-debug.apk
